<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Vitals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="vitals.css" />
    <link rel="manifest" href="manifest.json">
</head>
<body data-page = "vitals">
    <nav class="bottom-nav">
        <button data-page="dashboard">
            <span>🏠</span>
            <small>Home</small>
        </button>
        <button data-page="vitals">
            <span>❤️</span>
            <small>Vitals</small>
        </button>
        <button data-page="medications">
            <span>💊</span>
            <small>Meds</small>
        </button>
        <button data-page="reports">
            <span>📊</span>
            <small>Reports</small>
        </button>
        <button data-page="voice">
            <span>🎤</span>
            <small>Voice</small>
        </button>
        <button data-page="steps">
            <span>👣</span>
            <small>Steps</small>
        </button>
    </nav>

   <div class="page-container container">
    <form id="vitalsForm">
        <h2>Record Vitals</h2>

        <div class="grid-container">
            <div class="input-group">
                <label>Blood Pressure</label>
                <input type="text" id="bp" placeholder="120/80" required />
            </div>

            <div class="input-group">
                <label>Heart Rate</label>
                <input type="number" id="hr" placeholder="90" required />
            </div>

            <div class="input-group">
                <label>Temp (°C)</label>
                <input type="number" step="0.1" id="temp" placeholder="35.5" required />
            </div>

            <div class="input-group">
                <label>Sugar Level (mg/dl)</label>
                <input type="number" id="sl" placeholder="100" required />
            </div>
        </div>

        <button type="submit">Save Vitals</button>
    </form>
    <p id="statusMsg"></p>

    <div class="vitals-targets" id="vitalsTargets">
        <h2>Recommended Targets</h2>
        <p id="vitalsTargetsEmpty" class="empty-state">No recommended targets set.</p>
        <div id="vitalsTargetsGrid" class="vitals-target-grid"></div>
    </div>

    <div class="vitals-history">
        <h2>Vitals History</h2>
        <p id="vitalsEmpty" class="empty-state">No vitals recorded yet.</p>
        <ul id="vitalsList"></ul>
    </div>
</div>
    <script src="utils.js"></script>
    <script src="bottom-nav.js"></script>
    <script src="vitals.js"></script>
</body>
</html>
